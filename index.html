<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebAR Alpha Video - Grabar Cámara + AR</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Estilos para el botón de grabación */
        #recording-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            background-color: #ff0000;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-family: sans-serif;
        }
        #recording-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #recording-btn.recording {
            background-color: #555;
            animation: pulse 1.5s infinite;
        }
        /* Ocultar el canvas de mezcla técnico */
        #recorder-canvas {
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>

    <script>
        // Tu Shader original para Video SBS con Alpha
        AFRAME.registerShader('video-alpha-sbs-shader', {
            schema: { src: {type: 'map', is: 'uniform'} },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D src;
                void main() {
                    vec2 uvColor = vec2(vUv.x, vUv.y * 0.5 + 0.5);
                    vec2 uvAlpha = vec2(vUv.x, vUv.y * 0.5);
                    vec4 texColor = texture2D(src, uvColor);
                    vec4 texAlpha = texture2D(src, uvAlpha);
                    gl_FragColor = vec4(texColor.rgb, texAlpha.r);
                }
            `
        });
    </script>
</head>

<body>
    <!-- Botón de Interfaz -->
    <button id="recording-btn">Grabar Video</button>

    <!-- Canvas oculto donde haremos la mezcla de cámara + AR -->
    <canvas id="recorder-canvas"></canvas>

    <!-- Escena A-Frame. Añadimos preserveDrawingBuffer para poder capturar el canvas -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true; preserveDrawingBuffer: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Tu video de animación -->
            <video id="vid" src="Video_WebAR.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- El plano AR que se superpone -->
            <a-entity geometry="primitive: plane; width: 1; height: 1"
                      material="shader: video-alpha-sbs-shader; src: #vid; transparent: true">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Lógica de Video (Play/Pause al detectar target)
        const targetEl = document.querySelector('[mindar-image-target]');
        const videoAnimation = document.querySelector('#vid');
        
        targetEl.addEventListener("targetFound", () => videoAnimation.play());
        targetEl.addEventListener("targetLost", () => videoAnimation.pause());

        // --- LÓGICA DE GRABACIÓN COMPLETA (CÁMARA + AR) ---
        const btn = document.getElementById('recording-btn');
        const recorderCanvas = document.getElementById('recorder-canvas');
        const recorderCtx = recorderCanvas.getContext('2d');

        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let mixInterval;

        btn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        async function startRecording() {
            recordedChunks = [];
            
            // 1. Obtener los elementos técnicos
            const aframeCanvas = document.querySelector('canvas.a-canvas');
            // MindAR crea un video para la cámara, generalmente es el único video sin ID
            const cameraVideo = document.querySelector('video:not([id])'); 

            if (!cameraVideo) {
                alert("Error: No se pudo detectar la cámara web para la mezcla.");
                return;
            }

            // 2. Configurar el canvas de mezcla para que coincida con la cámara
            recorderCanvas.width = cameraVideo.videoWidth;
            recorderCanvas.height = cameraVideo.videoHeight;

            // 3. Función de mezcla (Compositing) en cada frame
            function mixFrames() {
                if (!isRecording) return;

                // Dibujar primero el fondo: la cámara web (la persona)
                recorderCtx.drawImage(cameraVideo, 0, 0, recorderCanvas.width, recorderCanvas.height);
                
                // Dibujar encima la animación AR (el canvas de A-Frame)
                recorderCtx.drawImage(aframeCanvas, 0, 0, recorderCanvas.width, recorderCanvas.height);
                
                // Solicitar el siguiente frame
                requestAnimationFrame(mixFrames);
            }

            // 4. Iniciar la grabación del stream del canvas de mezcla
            const stream = recorderCanvas.captureStream(30); // 30 FPS
            
            // Intentar usar VP9 para mejor calidad/tamaño, si no, usar por defecto
            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            mediaRecorder = new MediaRecorder(stream, options);

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = exportVideo;

            isRecording = true;
            mediaRecorder.start();
            
            // Iniciar el bucle de mezcla de imágenes
            requestAnimationFrame(mixFrames);

            btn.textContent = "Detener y Guardar";
            btn.classList.add('recording');
        }

        function stopRecording() {
            isRecording = false;
            mediaRecorder.stop();
            btn.textContent = "Grabar Video";
            btn.classList.remove('recording');
        }

        function exportVideo() {
            // Crear el blob final y descargarlo
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            // Nombre del archivo con marca de tiempo básica
            a.download = `ar-experiencia-${Date.now()}.webm`;
            a.click();
            
            // Limpieza
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }
    </script>
</body>
</html>
