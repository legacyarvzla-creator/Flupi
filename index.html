<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebAR - Grabar Entorno + Animación</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        #recording-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 15px 25px;
            border-radius: 50px;
            background-color: #ff0000;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #recording-btn.recording {
            background-color: #222;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }
        /* Canvas de mezcla oculto */
        #recording-canvas {
            display: none;
        }
    </style>

    <script>
        AFRAME.registerShader('video-alpha-sbs-shader', {
            schema: { src: {type: 'map', is: 'uniform'} },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D src;
                void main() {
                    vec2 uvColor = vec2(vUv.x, vUv.y * 0.5 + 0.5);
                    vec2 uvAlpha = vec2(vUv.x, vUv.y * 0.5);
                    vec4 texColor = texture2D(src, uvColor);
                    vec4 texAlpha = texture2D(src, uvAlpha);
                    gl_FragColor = vec4(texColor.rgb, texAlpha.r);
                }
            `
        });
    </script>
</head>

<body>
    <button id="recording-btn">Iniciar Grabación</button>
    <canvas id="recording-canvas"></canvas>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             renderer="preserveDrawingBuffer: true; antialias: true; colorManagement: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="Video_WebAR.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity geometry="primitive: plane; width: 1; height: 1"
                      material="shader: video-alpha-sbs-shader; src: #vid; transparent: true">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('recording-btn');
        const recordingCanvas = document.getElementById('recording-canvas');
        const ctx = recordingCanvas.getContext('2d');
        const videoAnim = document.querySelector('#vid');
        
        let mediaRecorder;
        let chunks = [];
        let isRecording = false;

        // Control de reproducción del video AR
        const targetEl = document.querySelector('[mindar-image-target]');
        targetEl.addEventListener("targetFound", () => videoAnim.play());
        targetEl.addEventListener("targetLost", () => videoAnim.pause());

        btn.addEventListener('click', () => {
            if (!isRecording) {
                startCapture();
            } else {
                stopCapture();
            }
        });

        function startCapture() {
            // Buscamos el video de la cámara que crea MindAR
            const cameraVideo = document.querySelector('video:not([id])') || document.querySelector('video');
            const aframeCanvas = document.querySelector('canvas.a-canvas');

            if (!cameraVideo || !aframeCanvas) {
                alert("No se encontró la fuente de video o el canvas AR");
                return;
            }

            // Ajustamos el canvas de grabación al tamaño real de la cámara
            recordingCanvas.width = cameraVideo.videoWidth || 1280;
            recordingCanvas.height = cameraVideo.videoHeight || 720;

            isRecording = true;
            chunks = [];

            // Grabamos a 30 FPS
            const stream = recordingCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });

            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = saveVideo;

            // El "Motor de Mezcla"
            function renderFrame() {
                if (!isRecording) return;

                // 1. Dibujamos la cámara (el entorno: laptop, manos, etc)
                ctx.drawImage(cameraVideo, 0, 0, recordingCanvas.width, recordingCanvas.height);
                
                // 2. Dibujamos encima el AR (la animación con transparencia)
                ctx.drawImage(aframeCanvas, 0, 0, recordingCanvas.width, recordingCanvas.height);
                
                requestAnimationFrame(renderFrame);
            }

            mediaRecorder.start();
            renderFrame();
            
            btn.textContent = "Detener y Descargar";
            btn.classList.add('recording');
        }

        function stopCapture() {
            isRecording = false;
            mediaRecorder.stop();
            btn.textContent = "Iniciar Grabación";
            btn.classList.remove('recording');
        }

        function saveVideo() {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `experiencia_ar_${Date.now()}.webm`;
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
