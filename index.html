<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebAR - Grabar Video + Audio Completo</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        #recording-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 15px 25px;
            border-radius: 50px;
            background-color: #ff0000;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #recording-btn.recording {
            background-color: #222;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }
        #recording-canvas { display: none; }
    </style>

    <script>
        AFRAME.registerShader('video-alpha-sbs-shader', {
            schema: { src: {type: 'map', is: 'uniform'} },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform sampler2D src;
                void main() {
                    vec2 uvColor = vec2(vUv.x, vUv.y * 0.5 + 0.5);
                    vec2 uvAlpha = vec2(vUv.x, vUv.y * 0.5);
                    vec4 texColor = texture2D(src, uvColor);
                    vec4 texAlpha = texture2D(src, uvAlpha);
                    gl_FragColor = vec4(texColor.rgb, texAlpha.r);
                }
            `
        });
    </script>
</head>

<body>
    <button id="recording-btn">Iniciar Grabación con Audio</button>
    <canvas id="recording-canvas"></canvas>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             renderer="preserveDrawingBuffer: true; antialias: true; colorManagement: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Nota: Asegúrate de que el video tenga audio o prueba con uno que lo tenga -->
            <video id="vid" src="Video_WebAR.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity geometry="primitive: plane; width: 1; height: 1"
                      material="shader: video-alpha-sbs-shader; src: #vid; transparent: true">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('recording-btn');
        const recordingCanvas = document.getElementById('recording-canvas');
        const ctx = recordingCanvas.getContext('2d');
        const videoAnim = document.querySelector('#vid');
        
        let mediaRecorder;
        let chunks = [];
        let isRecording = false;
        let audioContext, mixer;

        const targetEl = document.querySelector('[mindar-image-target]');
        targetEl.addEventListener("targetFound", () => videoAnim.play());
        targetEl.addEventListener("targetLost", () => videoAnim.pause());

        btn.addEventListener('click', async () => {
            if (!isRecording) {
                await startCapture();
            } else {
                stopCapture();
            }
        });

        async function startCapture() {
            const cameraVideo = document.querySelector('video:not([id])') || document.querySelector('video');
            const aframeCanvas = document.querySelector('canvas.a-canvas');

            if (!cameraVideo || !aframeCanvas) return alert("Error de fuentes");

            recordingCanvas.width = cameraVideo.videoWidth || 1280;
            recordingCanvas.height = cameraVideo.videoHeight || 720;

            // --- GESTIÓN DE AUDIO ---
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            mixer = audioContext.createMediaStreamDestination();

            // 1. Capturar Micrófono
            try {
                const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const micSource = audioContext.createMediaStreamSource(micStream);
                micSource.connect(mixer);
            } catch (e) {
                console.warn("Microfono no disponible:", e);
            }

            // 2. Capturar Audio del Video AR
            const videoSource = audioContext.createMediaElementSource(videoAnim);
            videoSource.connect(mixer);
            videoSource.connect(audioContext.destination); // Para que tú también lo escuches mientras grabas

            // --- UNIR VIDEO Y AUDIO ---
            const videoStream = recordingCanvas.captureStream(30);
            const combinedStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...mixer.stream.getAudioTracks()
            ]);

            isRecording = true;
            chunks = [];

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = saveVideo;

            function renderFrame() {
                if (!isRecording) return;
                ctx.drawImage(cameraVideo, 0, 0, recordingCanvas.width, recordingCanvas.height);
                ctx.drawImage(aframeCanvas, 0, 0, recordingCanvas.width, recordingCanvas.height);
                requestAnimationFrame(renderFrame);
            }

            mediaRecorder.start();
            renderFrame();
            
            btn.textContent = "Detener Grabación";
            btn.classList.add('recording');
        }

        function stopCapture() {
            isRecording = false;
            mediaRecorder.stop();
            audioContext.close();
            btn.textContent = "Iniciar Grabación";
            btn.classList.remove('recording');
        }

        function saveVideo() {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `ar_con_audio_${Date.now()}.webm`;
            link.click();
        }
    </script>
</body>
</html>
